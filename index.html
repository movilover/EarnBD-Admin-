<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Lover - Pro Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; padding: 15px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #ff0000; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        
        .list-item, .cat-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px; background: #181818; border: 1px solid #222; 
            margin-bottom: 8px; border-radius: 10px;
        }
        
        .movie-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .thumb-preview { width: 60px; height: 40px; object-fit: cover; border-radius: 5px; border: 1px solid #333; }
        .movie-text { font-size: 13px; font-weight: 500; color: #eee; }
        .action-btns { display: flex; gap: 8px; }
        .mini-btn { padding: 6px 12px; border-radius: 6px; font-size: 10px; text-transform: uppercase; width: auto; margin-top: 0; cursor: pointer; position: relative; z-index: 10; }
        
        h3 { margin-bottom: 15px; font-size: 16px; color: #ff0000; display: flex; justify-content: space-between; align-items: center;}
        .save-order-btn { width: auto; padding: 6px 12px; background: #ffc107; color: #000; font-size: 10px; margin: 0; border-radius: 5px; }
        #loginArea { max-width: 400px; margin: 100px auto; }
        .handle { cursor: grab; margin-right: 10px; color: #555; }
    </style>
</head>
<body>

    <div id="loginArea" class="card">
        <h2 style="text-align:center; color: red;">ADMIN LOGIN</h2>
        <input type="password" id="adminPass" placeholder="Enter PIN">
        <button onclick="login()" style="background: red; color: white;">Login</button>
    </div>

    <div id="adminContent" style="display:none;">
        <div class="card">
            <h3><i class="fa fa-cog"></i> Configs</h3>
            <input id="tgInput" placeholder="Telegram Link">
            <button onclick="saveConfig('telegramLink', 'tgInput')" style="background: #007bff; color: white;">Save Telegram</button>
            <input id="notifInput" placeholder="Notice Board Text" style="margin-top:10px;">
            <button onclick="saveConfig('notice', 'notifInput')" style="background: #ff0080; color: white;">Save Notice</button>
        </div>

        <div class="card">
            <h3 id="catTitle"><i class="fa fa-list"></i> Manage Categories <button onclick="saveCatOrder()" class="save-order-btn">Save Order</button></h3>
            <input id="newCatInput" placeholder="Category Name">
            <button id="catActionBtn" onclick="addCategory()" style="background: orange; color: white;">Add Category</button>
            <button id="catCancelBtn" onclick="resetCatForm()" style="display:none; background: #444; color: white;">Cancel Edit</button>
            <div id="adminCategoryList" style="margin-top: 15px;"></div>
        </div>

        <div class="card" id="formAnchor">
            <h3 id="formTitle"><i class="fa fa-upload"></i> Upload Movie</h3>
            <input id="vTitle" placeholder="Movie Title">
            <input id="vLink" placeholder="Video Link">
            <input id="vThumb" placeholder="Thumbnail URL">
            <select id="vCatSelect"></select>
            <button id="saveBtn" onclick="saveMovie()" style="background: #28a745; color: white;">Upload Now</button>
            <button id="cancelBtn" onclick="resetForm()" style="display:none; background: #444; color: white;">Cancel Edit</button>
        </div>

        <div class="card">
            <h3><i class="fa fa-film"></i> Movie List <button onclick="saveMovieOrder()" class="save-order-btn">Save Order</button></h3>
            <div id="movieList"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPEvyz0GVGUGvF2K0H3e2Dx4Qw_WCYjFU",
            authDomain: "movi-lover-video.firebaseapp.com",
            projectId: "movi-lover-video",
            databaseURL: "https://movi-lover-video-default-rtdb.firebaseio.com",
            appId: "1:1063457095926:web:4695d26c35e8b603326cd7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let editKey = null;
        let catEditIndex = null;
        let movies = [];
        let categories = [];

        function login() {
            if(document.getElementById('adminPass').value === "153781") {
                document.getElementById('loginArea').style.display='none';
                document.getElementById('adminContent').style.display='block';
                loadData();
            } else { alert("Wrong PIN"); }
        }

        function loadData() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                const videoData = data.movies || {};
                movies = Object.keys(videoData).map(k => ({...videoData[k], key: k}));
                if(data.movieOrder) {
                    movies.sort((a, b) => data.movieOrder.indexOf(a.key) - data.movieOrder.indexOf(b.key));
                } else { movies.reverse(); }
                categories = data.categories || [];
                renderUI();
            });
        }

        function renderUI() {
            // Category Dropdown
            document.getElementById('vCatSelect').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
            
            // Category Admin List with Edit Button
            const catListDiv = document.getElementById('adminCategoryList');
            catListDiv.innerHTML = categories.map((c, i) => `
                <div class="cat-item" data-name="${c}">
                    <span><i class="fas fa-bars handle"></i> ${c}</span>
                    <div class="action-btns">
                        <button onclick="processCatEdit(${i})" class="mini-btn" style="background: blue; color: white;">Edit</button>
                        <button onclick="deleteCategory(${i})" class="mini-btn" style="background: red; color: white;">X</button>
                    </div>
                </div>
            `).join('');
            new Sortable(catListDiv, { animation: 150, handle: '.handle' });

            // Movie Admin List
            const list = document.getElementById('movieList');
            list.innerHTML = movies.map(m => `
                <div class="list-item" data-id="${m.key}">
                    <div class="movie-info">
                        <i class="fas fa-bars handle"></i>
                        <img src="${m.thumb}" class="thumb-preview" onerror="this.src='https://via.placeholder.com/60x40'">
                        <div>
                            <div class="movie-text">${m.title}</div>
                            <div style="font-size: 10px; color: #666;">${m.category}</div>
                        </div>
                    </div>
                    <div class="action-btns">
                        <button onclick="processEdit('${m.key}')" class="mini-btn" style="background: blue; color: white;">Edit</button>
                        <button onclick="delM('${m.key}')" class="mini-btn" style="background: red; color: white;">Del</button>
                    </div>
                </div>
            `).join('');
            new Sortable(list, { animation: 150, handle: '.handle' });
        }

        // --- Category Functions ---
        function addCategory() {
            const name = document.getElementById('newCatInput').value;
            if(!name) return;
            if(catEditIndex !== null) {
                categories[catEditIndex] = name;
                catEditIndex = null;
            } else {
                categories.push(name);
            }
            db.ref('categories').set(categories).then(() => resetCatForm());
        }

        function processCatEdit(index) {
            catEditIndex = index;
            document.getElementById('newCatInput').value = categories[index];
            document.getElementById('catTitle').innerHTML = "<i class='fa fa-edit'></i> Edit Category";
            document.getElementById('catActionBtn').innerText = "Update Category";
            document.getElementById('catActionBtn').style.background = "#0055ff";
            document.getElementById('catCancelBtn').style.display = "block";
        }

        function resetCatForm() {
            catEditIndex = null;
            document.getElementById('newCatInput').value = '';
            document.getElementById('catTitle').innerHTML = "<i class='fa fa-list'></i> Manage Categories";
            document.getElementById('catActionBtn').innerText = "Add Category";
            document.getElementById('catActionBtn').style.background = "orange";
            document.getElementById('catCancelBtn').style.display = "none";
        }

        function deleteCategory(index) { 
            if(confirm("Delete Category?")) { categories.splice(index, 1); db.ref('categories').set(categories); } 
        }

        // --- Movie Functions ---
        function processEdit(key) {
            const m = movies.find(x => x.key === key);
            if(m) {
                editKey = key;
                document.getElementById('vTitle').value = m.title;
                document.getElementById('vLink').value = m.link;
                document.getElementById('vThumb').value = m.thumb;
                document.getElementById('vCatSelect').value = m.category;
                document.getElementById('formTitle').innerHTML = `<i class='fa fa-edit'></i> Editing: ${m.title}`;
                document.getElementById('saveBtn').innerText = "Update Now";
                document.getElementById('saveBtn').style.background = "#0055ff";
                document.getElementById('cancelBtn').style.display = "block";
                document.getElementById('formAnchor').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function saveMovie() {
            const v = { 
                title: document.getElementById('vTitle').value, 
                link: document.getElementById('vLink').value, 
                thumb: document.getElementById('vThumb').value, 
                category: document.getElementById('vCatSelect').value 
            };
            if(!v.title || !v.link) return alert("Required!");
            if(editKey) {
                db.ref('movies/' + editKey).update(v).then(() => resetForm());
            } else {
                db.ref('movies').push(v).then(() => resetForm());
            }
        }

        function resetForm() {
            editKey = null;
            document.getElementById('vTitle').value = ''; document.getElementById('vLink').value = ''; document.getElementById('vThumb').value = '';
            document.getElementById('formTitle').innerHTML = "<i class='fa fa-upload'></i> Upload Movie";
            document.getElementById('saveBtn').innerText = "Upload Now";
            document.getElementById('saveBtn').style.background = "#28a745";
            document.getElementById('cancelBtn').style.display = "none";
        }

        function saveCatOrder() { 
            const items = document.querySelectorAll('#adminCategoryList .cat-item'); 
            const newOrder = Array.from(items).map(item => item.getAttribute('data-name')); 
            db.ref('categories').set(newOrder).then(() => alert("Order Saved!")); 
        }

        function saveMovieOrder() { 
            const items = document.querySelectorAll('#movieList .list-item'); 
            const newOrder = Array.from(items).map(item => item.getAttribute('data-id')); 
            db.ref('movieOrder').set(newOrder).then(() => alert("Order Saved!")); 
        }

        function delM(key) { if(confirm("Delete?")) db.ref('movies/' + key).remove(); }
        function saveConfig(path, id) { db.ref(path).set(document.getElementById(id).value).then(() => alert("Saved!")); }
    </script>
</body>
</html>
